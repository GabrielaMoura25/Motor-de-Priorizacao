version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: estoque-prioridade-api
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/estoque_db
    ports:
      - "3000:3000"

  postgres:
    image: postgres:16
    container_name: postgres-estoque
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: estoque_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_estoque_data:/var/lib/postgresql/data

volumes:
  postgres_estoque_data:
